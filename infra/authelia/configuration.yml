---
# Authelia 配置文件

# ─── 服务器 ───────────────────────────────────
server:
  address: tcp://0.0.0.0:9091   # 4.38+ 新格式，替代已废弃的 host/port

# ─── 日志 ─────────────────────────────────────
log:
  level: info

# ─── 用户目录 ──────────────────────────────────
authentication_backend:
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2id

# ─── 多因素认证 ────────────────────────────────
totp:
  issuer: my_rss

webauthn:
  disable: false

# ─── 密码重置（MVP 阶段禁用，避免 jwt_secret 依赖）──
identity_validation:
  reset_password:
    disable: true

# ─── 访问控制 ──────────────────────────────────
access_control:
  default_policy: deny
  rules:
    - domain:
        - 'reader.{{ env "DOMAIN" }}'
        - 'staging-reader.{{ env "DOMAIN" }}'
      policy: two_factor

# ─── Session ──────────────────────────────────
# secret 通过 AUTHELIA_SESSION_SECRET_FILE 环境变量注入
session:
  name: authelia_session
  same_site: lax
  inactivity: 30m
  expiration: 8h
  remember_me: 7d
  cookies:
    - domain: '{{ env "DOMAIN" }}'
      authelia_url: 'https://auth.{{ env "DOMAIN" }}'
      default_redirection_url: 'https://reader.{{ env "DOMAIN" }}'

# ─── 存储 ─────────────────────────────────────
# encryption_key 通过 AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE 环境变量注入
storage:
  local:
    path: /config/db.sqlite3

# ─── 通知器（MVP：写文件替代发邮件）──────────────
# 验证码会写到容器内 /config/notification.txt
# 查看方式：docker exec myrss-prod-authelia-1 cat /config/notification.txt
notifier:
  filesystem:
    filename: /config/notification.txt
