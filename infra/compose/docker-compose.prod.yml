# 生产环境覆盖层
# 用途：给 prod 后端服务设置网络别名，让 Caddy 能用 miniflux-prod/authelia-prod 找到它们
services:
  miniflux:
    networks:
      app:
        aliases:
          - miniflux-prod    # Caddyfile 里 reverse_proxy miniflux-prod:8080 指的就是这里
      data: {}

  authelia:
    networks:
      app:
        aliases:
          - authelia-prod    # Caddyfile 里 forward_auth authelia-prod:9091 指的就是这里

  postgres:
    networks:
      data: {}

  ai-reader-api:
    environment:
      AI_READER_CSRF_ALLOWED_ORIGINS: https://ai-reader.${DOMAIN}
    networks:
      app:
        aliases:
          - api-prod
      data: {}

  ai-reader-worker:
    environment:
      MINIFLUX_API_BASE_URL: http://miniflux-prod:8080
    networks:
      app: {}
      data: {}

  reader-web:
    environment:
      MINIFLUX_API_BASE_URL: http://miniflux-prod:8080
      SCORING_SERVICE_URL: http://api-prod:8000
    networks:
      app:
        aliases:
          - web-prod
      data: {}
