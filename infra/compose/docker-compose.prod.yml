# 生产环境覆盖层
# 用途：给 prod 后端服务设置网络别名，让 Caddy 能用 miniflux-prod/authelia-prod 找到它们
services:
  miniflux:
    networks:
      app:
        aliases:
          - miniflux-prod    # Caddyfile 里 reverse_proxy miniflux-prod:8080 指的就是这里
      data: {}

  authelia:
    networks:
      app:
        aliases:
          - authelia-prod    # Caddyfile 里 forward_auth authelia-prod:9091 指的就是这里

  postgres:
    networks:
      data: {}

  scorer-worker:
    environment:
      MINIFLUX_API_BASE_URL: http://miniflux-prod:8080
    networks:
      app:
        aliases:
          - scoring-service-prod
      data: {}

  reader-web:
    environment:
      MINIFLUX_API_BASE_URL: http://miniflux-prod:8080
      SCORING_SERVICE_URL: http://scoring-service-prod:8000
    networks:
      app:
        aliases:
          - reader-web-prod
      data: {}
