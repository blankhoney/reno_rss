# 共享边缘入口：整台 VPS 只启动一次
# 启动命令：docker compose -p myrss-edge -f infra/compose/docker-compose.edge.yml up -d
services:
  caddy:
    image: caddy:2.8
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 支持
    environment:
      DOMAIN: ${DOMAIN}          # 注入到容器，供 Caddyfile {$DOMAIN} 使用
      AI_READER_API_UPSTREAM: ${AI_READER_API_UPSTREAM:-api-prod:8000}
      AI_READER_WEB_UPSTREAM: ${AI_READER_WEB_UPSTREAM:-web-prod:3000}
      AI_READER_AUTH_UPSTREAM: ${AI_READER_AUTH_UPSTREAM:-authelia-prod:9091}
      AI_READER_STAGING_API_UPSTREAM: ${AI_READER_STAGING_API_UPSTREAM:-api-staging:8000}
      AI_READER_STAGING_WEB_UPSTREAM: ${AI_READER_STAGING_WEB_UPSTREAM:-web-staging:3000}
      AI_READER_STAGING_AUTH_UPSTREAM: ${AI_READER_STAGING_AUTH_UPSTREAM:-authelia-staging:9091}
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data         # 证书缓存，重建容器不丢证书
      - caddy_config:/config
      - /srv/caddy-conf.d:/etc/caddy/conf.d:ro
      - /srv/caddy-conf.d:/etc/caddy/conf.d:ro
    networks:
      - app                      # 通过此网络访问后端服务别名

networks:
  app:
    name: myrss-app              # 全局共享网络，prod/staging 后端也接入这个网络
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
