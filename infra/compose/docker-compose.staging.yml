# 预发环境覆盖层
# 用途：给 staging 后端服务设置不同别名，与 prod 共享同一个 Caddy 但路由隔离
services:
  miniflux:
    environment:
      BASE_URL: https://staging-reader.${DOMAIN}   # staging 的外部访问地址
    networks:
      app:
        aliases:
          - miniflux-staging
      data: {}

  authelia:
    networks:
      app:
        aliases:
          - authelia-staging

  postgres:
    networks:
      data: {}

  ai-reader-api:
    environment:
      AI_READER_CSRF_ALLOWED_ORIGINS: https://staging-ai-reader.${DOMAIN}
      # Staging-only: resolve anonymous (no-cookie) requests to a shared demo
      # user so the public demo needs no login. NEVER set this in prod.
      AI_READER_ANONYMOUS_DEMO: "true"
    networks:
      app:
        aliases:
          - api-staging
      data: {}

  ai-reader-worker:
    environment:
      MINIFLUX_API_BASE_URL: http://miniflux-staging:8080
    networks:
      app: {}
      data: {}

  reader-web:
    environment:
      DEMO_LANDING_ENABLED: "true"
      DEMO_USERNAME: ${DEMO_USERNAME}
      DEMO_PASSWORD: ${DEMO_PASSWORD}
      DEMO_AUTHELIA_BASE_URL: https://staging-auth.${DOMAIN}
      DEMO_TARGET_URL: https://staging-ai-reader.${DOMAIN}/?module=all&sort=default&lang=zh
      DEMO_ALLOWED_ORIGIN: https://staging-ai-reader.${DOMAIN}
    networks:
      app:
        aliases:
          - web-staging
