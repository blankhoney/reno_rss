name: ci

on:
  pull_request:

jobs:
  checks:
    name: lint / test / compose-validate / trivy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        working-directory: apps/scorer-worker
        run: pip install -U pip && pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: apps/scorer-worker
        run: ruff check src/

      - name: Unit tests
        working-directory: apps/scorer-worker
        run: pytest tests/ -q

      - name: Validate Compose config
        run: |
          cp .env.example .env
          docker compose \
            --env-file .env \
            -f infra/compose/docker-compose.base.yml \
            config > /dev/null

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
