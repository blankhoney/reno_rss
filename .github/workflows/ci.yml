name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  checks:
    name: lint / test / compose-validate / trivy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        working-directory: apps/scorer-worker
        run: pip install -U pip && pip install -e ".[dev]"

      - name: Lint scorer-worker
        working-directory: apps/scorer-worker
        run: ruff check src/

      - name: Test scorer-worker
        working-directory: apps/scorer-worker
        run: pytest tests/ -q

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/reader-web/package-lock.json

      - name: Install reader-web dependencies
        working-directory: apps/reader-web
        run: npm ci

      - name: Test reader-web
        working-directory: apps/reader-web
        run: npm test

      - name: Build reader-web
        working-directory: apps/reader-web
        run: npm run build

      - name: Validate Compose config
        run: |
          cp .env.example .env
          docker compose \
            --profile worker \
            --env-file .env \
            -f infra/compose/docker-compose.base.yml \
            config > /dev/null
          docker compose \
            --profile worker \
            --env-file .env \
            -f infra/compose/docker-compose.base.yml \
            -f infra/compose/docker-compose.staging.yml \
            config > /dev/null
          docker compose \
            --profile worker \
            --env-file .env \
            -f infra/compose/docker-compose.base.yml \
            -f infra/compose/docker-compose.prod.yml \
            config > /dev/null

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

  images:
    name: build / push GHCR images
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    outputs:
      deploy_ref: ${{ steps.meta.outputs.deploy_ref }}
      deploy_sha: ${{ steps.meta.outputs.deploy_sha }}
      image_registry: ${{ steps.meta.outputs.image_registry }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      reader_image: ${{ steps.meta.outputs.reader_image }}
      scorer_image: ${{ steps.meta.outputs.scorer_image }}

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        env:
          DEPLOY_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          DEPLOY_REF: ${{ github.head_ref || github.ref_name }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
        run: |
          set -euo pipefail
          repo_lc="$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          image_registry="ghcr.io/${repo_lc}"
          short_sha="${DEPLOY_SHA:0:7}"
          image_tag="sha-${short_sha}"
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            extra_tag="pr-${PR_NUMBER}-${short_sha}"
          else
            extra_tag="main-${short_sha}"
          fi

          {
            echo "deploy_ref=${DEPLOY_REF}"
            echo "deploy_sha=${DEPLOY_SHA}"
            echo "image_registry=${image_registry}"
            echo "image_tag=${image_tag}"
            echo "reader_image=${image_registry}/reader-web:${image_tag}"
            echo "scorer_image=${image_registry}/scorer-worker:${image_tag}"
            echo "reader_tags<<EOF"
            echo "${image_registry}/reader-web:${image_tag}"
            echo "${image_registry}/reader-web:${extra_tag}"
            echo "EOF"
            echo "scorer_tags<<EOF"
            echo "${image_registry}/scorer-worker:${image_tag}"
            echo "${image_registry}/scorer-worker:${extra_tag}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push reader-web
        uses: docker/build-push-action@v6
        with:
          context: apps/reader-web
          file: apps/reader-web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.reader_tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.deploy_sha }}

      - name: Build and push scorer-worker
        uses: docker/build-push-action@v6
        with:
          context: apps/scorer-worker
          file: apps/scorer-worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.scorer_tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.deploy_sha }}

      - name: Image summary
        run: |
          {
            echo "### Published images"
            echo "- reader-web: \`${{ steps.meta.outputs.reader_image }}\`"
            echo "- scorer-worker: \`${{ steps.meta.outputs.scorer_image }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-staging:
    name: deploy staging
    runs-on: ubuntu-latest
    needs: images
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    environment:
      name: staging
      url: https://staging-ai-reader.blankhoney.xyz

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.images.outputs.deploy_sha }}

      - name: Deploy staging on VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEPLOY_ENV: staging
          DEPLOY_REF: ${{ needs.images.outputs.deploy_ref }}
          DEPLOY_SHA: ${{ needs.images.outputs.deploy_sha }}
          IMAGE_REGISTRY: ${{ needs.images.outputs.image_registry }}
          IMAGE_TAG: ${{ needs.images.outputs.image_tag }}
        run: |
          set -euo pipefail
          key_file="$(mktemp)"
          trap 'rm -f "$key_file"' EXIT
          printf '%s' "$SSH_KEY" > "$key_file"
          chmod 600 "$key_file"

          quote() { printf '%q' "$1"; }
          remote_env="DEPLOY_ENV=$(quote "$DEPLOY_ENV") DEPLOY_REF=$(quote "$DEPLOY_REF") DEPLOY_SHA=$(quote "$DEPLOY_SHA") IMAGE_REGISTRY=$(quote "$IMAGE_REGISTRY") IMAGE_TAG=$(quote "$IMAGE_TAG") VPS_APP_DIR=$(quote "$VPS_APP_DIR") GHCR_USERNAME=$(quote "$GHCR_USERNAME") GHCR_TOKEN=$(quote "$GHCR_TOKEN")"

          ssh -i "$key_file" -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "$remote_env bash -s" < .github/scripts/remote-deploy.sh

          {
            echo "### Staging deploy"
            echo "- commit: \`${DEPLOY_SHA}\`"
            echo "- tag: \`${IMAGE_TAG}\`"
            echo "- reader-web: \`${{ needs.images.outputs.reader_image }}\`"
            echo "- scorer-worker: \`${{ needs.images.outputs.scorer_image }}\`"
            echo "- url: https://staging-ai-reader.blankhoney.xyz"
          } >> "$GITHUB_STEP_SUMMARY"
