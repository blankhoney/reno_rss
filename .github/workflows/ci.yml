name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  checks:
    name: lint / test / compose-validate / trivy
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install -U uv

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/reader-web/package-lock.json

      - name: Test api
        working-directory: apps/api
        run: uv run --isolated --with-editable . --extra dev python -m pytest tests -q

      - name: Lint api
        working-directory: apps/api
        run: uv run --isolated --with-editable . --extra dev ruff check .

      - name: Export API OpenAPI schema
        working-directory: apps/api
        run: uv run --isolated --with-editable . --extra dev python -m app.export_openapi --out openapi.json

      - name: Generate reader-web API types
        run: npx --yes openapi-typescript@7.13.0 apps/api/openapi.json -o apps/reader-web/src/lib/api/generated/schema.ts

      - name: Check generated API artifacts
        run: git diff --exit-code -- apps/api/openapi.json apps/reader-web/src/lib/api/generated/schema.ts

      - name: Check Alembic clean upgrade
        working-directory: apps/api
        env:
          SCORING_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: uv run --isolated --with-editable . --extra dev alembic upgrade head

      - name: Test worker
        working-directory: apps/worker
        env:
          WORKER_QUEUE_POSTGRES_TEST_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: uv run --isolated --with-editable . --extra dev python -m pytest tests -q

      - name: Lint worker
        working-directory: apps/worker
        run: uv run --isolated --with-editable . --extra dev ruff check .

      - name: Run worker mini benchmark
        working-directory: apps/worker
        env:
          LLM_PROVIDER: mock
        run: |
          uv run --isolated --with-editable . --extra dev python - <<'PY'
          from datetime import UTC, datetime, timedelta

          from app.benchmark.ranking import (
              BenchmarkArticle,
              BenchmarkDataset,
              BenchmarkUser,
              run_ranking_benchmark,
          )

          now = datetime(2026, 6, 24, tzinfo=UTC)
          articles = [
              BenchmarkArticle(
                  article_id=index + 1,
                  feed_ids=[1],
                  title=f"benchmark article {index + 1}",
                  tags=["ai"] if index < 10 else ["misc"],
                  base_score=95 - index,
                  published_at=now - timedelta(hours=index),
                  risk_uncertainty=20,
                  weak_label="must_read" if index < 10 else "skip",
              )
              for index in range(20)
          ]
          report = run_ranking_benchmark(
              BenchmarkDataset(
                  users=[BenchmarkUser(user_id="ci", priority_by_feed={1: 0})],
                  articles=articles,
                  generated_at=now,
              ),
              provider_name="mock",
          )
          if report.real_llm_calls != 0 or report.provider != "mock":
              raise SystemExit("ci mini benchmark must not call a real LLM")
          if report.status != "succeeded":
              raise SystemExit(f"ci mini benchmark failed: {report.failure_reason}")
          PY

      - name: Install Python dependencies
        working-directory: apps/scorer-worker
        run: pip install -U pip && pip install -e ".[dev]"

      - name: Lint scorer-worker
        working-directory: apps/scorer-worker
        run: ruff check src/

      - name: Test scorer-worker
        working-directory: apps/scorer-worker
        run: pytest tests/ -q

      - name: Install reader-web dependencies
        working-directory: apps/reader-web
        run: npm ci

      - name: Test reader-web
        working-directory: apps/reader-web
        run: npm test

      - name: Build reader-web
        working-directory: apps/reader-web
        run: npm run build

      - name: Validate Compose config
        run: |
          cp .env.example .env
          docker compose \
            --profile worker \
            --env-file .env \
            -f infra/compose/docker-compose.base.yml \
            config > /dev/null
          docker compose \
            --profile worker \
            --env-file .env \
            -f infra/compose/docker-compose.base.yml \
            -f infra/compose/docker-compose.staging.yml \
            config > /tmp/ai-reader-staging-compose.yml
          docker compose \
            --profile worker \
            --env-file .env \
            -f infra/compose/docker-compose.base.yml \
            -f infra/compose/docker-compose.prod.yml \
            config > /tmp/ai-reader-prod-compose.yml
          docker compose \
            --env-file .env \
            -f infra/compose/docker-compose.edge.yml \
            config > /dev/null
          grep -q "api-staging" /tmp/ai-reader-staging-compose.yml
          grep -q "web-staging" /tmp/ai-reader-staging-compose.yml
          grep -q "api-prod" /tmp/ai-reader-prod-compose.yml
          grep -q "web-prod" /tmp/ai-reader-prod-compose.yml

      - name: Check deploy scripts
        run: |
          bash -n infra/scripts/deploy.sh infra/scripts/backup.sh infra/scripts/smoke-test.sh infra/scripts/staging-runtime-proof.sh infra/scripts/check-deploy-migrations.sh .github/scripts/remote-deploy.sh .github/scripts/validate-deploy-env.sh
          bash infra/scripts/check-deploy-migrations.sh
          python - <<'PY'
          from pathlib import Path

          script = Path("infra/scripts/staging-runtime-proof.sh").read_text()
          marker = "python - <<'PY'"
          if marker not in script:
              raise SystemExit("missing containerized python here-doc")
          try:
              docker_block = script[: script.index(marker)].rsplit("docker exec", 1)[1]
          except IndexError as exc:
              raise SystemExit("missing docker exec for containerized proof") from exc
          if "-i" not in docker_block.split():
              raise SystemExit(
                  "staging-runtime-proof.sh must run docker exec -i so python receives the here-doc"
              )
          PY

      - name: Build Docker images
        run: |
          docker build -f apps/api/Dockerfile apps/api
          docker build -f apps/worker/Dockerfile .
          docker build -f apps/reader-web/Dockerfile apps/reader-web

      - name: Check whitespace
        run: git diff --check

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          trivyignores: ".trivyignore"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

  images:
    name: build / push GHCR images
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    outputs:
      deploy_ref: ${{ steps.meta.outputs.deploy_ref }}
      deploy_sha: ${{ steps.meta.outputs.deploy_sha }}
      image_registry: ${{ steps.meta.outputs.image_registry }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      web_image: ${{ steps.meta.outputs.web_image }}
      api_image: ${{ steps.meta.outputs.api_image }}
      worker_image: ${{ steps.meta.outputs.worker_image }}

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        env:
          DEPLOY_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          DEPLOY_REF: ${{ github.head_ref || github.ref_name }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
        run: |
          set -euo pipefail
          repo_lc="$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          image_registry="ghcr.io/${repo_lc}"
          short_sha="${DEPLOY_SHA:0:7}"
          image_tag="sha-${short_sha}"
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            extra_tag="pr-${PR_NUMBER}-${short_sha}"
          else
            extra_tag="main-${short_sha}"
          fi

          {
            echo "deploy_ref=${DEPLOY_REF}"
            echo "deploy_sha=${DEPLOY_SHA}"
            echo "image_registry=${image_registry}"
            echo "image_tag=${image_tag}"
            echo "web_image=${image_registry}/ai-reader-web:${image_tag}"
            echo "api_image=${image_registry}/ai-reader-api:${image_tag}"
            echo "worker_image=${image_registry}/ai-reader-worker:${image_tag}"
            echo "web_tags<<EOF"
            echo "${image_registry}/ai-reader-web:${image_tag}"
            echo "${image_registry}/ai-reader-web:${extra_tag}"
            echo "EOF"
            echo "api_tags<<EOF"
            echo "${image_registry}/ai-reader-api:${image_tag}"
            echo "${image_registry}/ai-reader-api:${extra_tag}"
            echo "EOF"
            echo "worker_tags<<EOF"
            echo "${image_registry}/ai-reader-worker:${image_tag}"
            echo "${image_registry}/ai-reader-worker:${extra_tag}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push ai-reader-web
        uses: docker/build-push-action@v6
        with:
          context: apps/reader-web
          file: apps/reader-web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.web_tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.deploy_sha }}

      - name: Build and push ai-reader-api
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.api_tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.deploy_sha }}

      - name: Build and push ai-reader-worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.worker_tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.deploy_sha }}

      - name: Image summary
        run: |
          {
            echo "### Published images"
            echo "- ai-reader-web: \`${{ steps.meta.outputs.web_image }}\`"
            echo "- ai-reader-api: \`${{ steps.meta.outputs.api_image }}\`"
            echo "- ai-reader-worker: \`${{ steps.meta.outputs.worker_image }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-staging:
    name: deploy staging
    runs-on: ubuntu-latest
    needs: images
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    environment:
      name: staging
      url: https://staging-ai-reader.blankhoney.xyz

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.images.outputs.deploy_sha }}

      - name: Deploy staging on VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEPLOY_ENV: staging
          DEPLOY_REF: ${{ needs.images.outputs.deploy_ref }}
          DEPLOY_SHA: ${{ needs.images.outputs.deploy_sha }}
          IMAGE_REGISTRY: ${{ needs.images.outputs.image_registry }}
          IMAGE_TAG: ${{ needs.images.outputs.image_tag }}
          RUN_STAGING_RUNTIME_PROOF: "1"
        run: |
          set -euo pipefail
          bash .github/scripts/validate-deploy-env.sh

          key_file="$(mktemp)"
          trap 'rm -f "$key_file"' EXIT
          bash .github/scripts/write-ssh-key.sh "$key_file"

          quote() { printf '%q' "$1"; }
          remote_env="DEPLOY_ENV=$(quote "$DEPLOY_ENV") DEPLOY_REF=$(quote "$DEPLOY_REF") DEPLOY_SHA=$(quote "$DEPLOY_SHA") IMAGE_REGISTRY=$(quote "$IMAGE_REGISTRY") IMAGE_TAG=$(quote "$IMAGE_TAG") VPS_APP_DIR=$(quote "$VPS_APP_DIR") GHCR_USERNAME=$(quote "$GHCR_USERNAME") GHCR_TOKEN=$(quote "$GHCR_TOKEN") RUN_STAGING_RUNTIME_PROOF=$(quote "$RUN_STAGING_RUNTIME_PROOF")"

          ssh -i "$key_file" -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "$remote_env bash -s" < .github/scripts/remote-deploy.sh

          {
            echo "### Staging deploy"
            echo "- commit: \`${DEPLOY_SHA}\`"
            echo "- tag: \`${IMAGE_TAG}\`"
            echo "- ai-reader-web: \`${{ needs.images.outputs.web_image }}\`"
            echo "- ai-reader-api: \`${{ needs.images.outputs.api_image }}\`"
            echo "- ai-reader-worker: \`${{ needs.images.outputs.worker_image }}\`"
            echo "- url: https://staging-ai-reader.blankhoney.xyz"
            echo "- smoke test: passed"
            echo "- runtime proof: passed"
          } >> "$GITHUB_STEP_SUMMARY"
