name: ci

on:
  pull_request:

jobs:
  checks:
    name: lint / test / compose-validate / trivy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        working-directory: apps/scorer-worker
        run: pip install -U pip && pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: apps/scorer-worker
        run: ruff check src/

      - name: Unit tests
        working-directory: apps/scorer-worker
        run: pytest tests/ -q

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/reader-web/package-lock.json

      - name: Install reader-web dependencies
        working-directory: apps/reader-web
        run: npm ci

      - name: Reader web tests
        working-directory: apps/reader-web
        run: npm test

      - name: Reader web build
        working-directory: apps/reader-web
        run: npm run build

      - name: Validate Compose config
        run: |
          cp .env.example .env
          docker compose \
            --profile worker \
            --env-file .env \
            -f infra/compose/docker-compose.base.yml \
            config > /dev/null
          docker compose \
            --profile worker \
            --env-file .env \
            -f infra/compose/docker-compose.base.yml \
            -f infra/compose/docker-compose.staging.yml \
            config > /dev/null
          docker compose \
            --profile worker \
            --env-file .env \
            -f infra/compose/docker-compose.base.yml \
            -f infra/compose/docker-compose.prod.yml \
            config > /dev/null

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
