name: deploy-prod

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "GHCR image tag to deploy, for example sha-abc1234"
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://ai-reader.blankhoney.xyz

    steps:
      - uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        run: |
          set -euo pipefail
          repo_lc="$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          {
            echo "deploy_ref=${GITHUB_REF_NAME}"
            echo "deploy_sha=${GITHUB_SHA}"
            echo "image_registry=ghcr.io/${repo_lc}"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy production on VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEPLOY_ENV: prod
          DEPLOY_REF: ${{ steps.meta.outputs.deploy_ref }}
          DEPLOY_SHA: ${{ steps.meta.outputs.deploy_sha }}
          IMAGE_REGISTRY: ${{ steps.meta.outputs.image_registry }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          bash .github/scripts/validate-deploy-env.sh

          key_file="$(mktemp)"
          trap 'rm -f "$key_file"' EXIT
          printf '%s' "$SSH_KEY" > "$key_file"
          chmod 600 "$key_file"

          quote() { printf '%q' "$1"; }
          remote_env="DEPLOY_ENV=$(quote "$DEPLOY_ENV") DEPLOY_REF=$(quote "$DEPLOY_REF") DEPLOY_SHA=$(quote "$DEPLOY_SHA") IMAGE_REGISTRY=$(quote "$IMAGE_REGISTRY") IMAGE_TAG=$(quote "$IMAGE_TAG") VPS_APP_DIR=$(quote "$VPS_APP_DIR") GHCR_USERNAME=$(quote "$GHCR_USERNAME") GHCR_TOKEN=$(quote "$GHCR_TOKEN")"

          ssh -i "$key_file" -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "$remote_env bash -s" < .github/scripts/remote-deploy.sh

          {
            echo "### Production deploy"
            echo "- code ref: \`${DEPLOY_REF}@${DEPLOY_SHA}\`"
            echo "- image tag: \`${IMAGE_TAG}\`"
            echo "- url: https://ai-reader.blankhoney.xyz"
          } >> "$GITHUB_STEP_SUMMARY"
